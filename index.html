<!DOCTYPE html>
<html lang="en">
<head>

<body>

<nav>
    <h2>🚀 DhairyaEditsz</h2>

    <div>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Game</a>
    </div>

    <button onclick="toggleMode()" id="modeBtn">🌙</button>
</nav>

<header>
    <h1>Just a little project, for fun 🚀</h1>
    <p><b>Learning coding & building cool projects 😎</b></p>

    <button onclick="showMessage()">Click Me</button>
</header>

<script>
function showMessage() {
    alert("🔥 Welcome to my website!");
}

function toggleMode() {
    document.body.classList.toggle("light-mode");

    let btn = document.getElementById("modeBtn");

    if (document.body.classList.contains("light-mode")) {
        btn.innerText = "🌞";
    } else {
        btn.innerText = "🌙";
    }
}
</script>

</body>
