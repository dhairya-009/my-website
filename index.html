<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DhairyaEditsz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2 class="logo">🚀 DhairyaEditsz</h2>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="#projects">Projects</a>
        <a href="game.html">Game</a>
    </div>

    <button onclick="toggleMode()" id="modeBtn">🌙</button>
</nav>

<header class="fade-in">
    <h1 id="typing"></h1>
    <p><b>Learning coding & building cool projects 😎</b></p>
</header>

<!-- PROJECT SECTION -->
<section id="projects">

<div class="card fade-in">
    <h3>🎮 Game Website</h3>
    <p>Fun browser games coming soon</p>
</div>

<div class="card fade-in">
    <h3>📊 Study Planner</h3>
    <p>Helps students manage time</p>
</div>

<div class="card fade-in">
    <h3>🛠️ Tools Website</h3>
    <p>Useful tools for daily work</p>
</div>

</section>

<!-- IMAGE GALLERY -->
<section class="gallery fade-in">
    <h2>My Work</h2>
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
</section>

<script>

// Typing effect
let text = "Just a little project, for fun 🚀";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

// Dark mode
function toggleMode() {
    document.body.classList.toggle("light-mode");

    let btn = document.getElementById("modeBtn");
    btn.innerText = document.body.classList.contains("light-mode") ? "🌞" : "🌙";
}

// Scroll animation
window.addEventListener("scroll", () => {
    document.querySelectorAll(".fade-in").forEach(el => {
        let top = el.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
            el.classList.add("show");
        }
    });
});

</script>

</body>
</html>
