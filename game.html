<!DOCTYPE html>
<html>
<head>
<title>Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2 class="logo">🎮 Game Zone</h2>
    <div class="nav-links">
        <a href="index.html">Home</a>
    </div>
</nav>

<h2 style="text-align:center;">Click Game 🎮</h2>
<p style="text-align:center;">Score: <span id="score">0</span></p>

<div style="text-align:center;">
<button onclick="increaseScore()">Click Fast!</button>
</div>

<script>
let score = 0;
function increaseScore() {
    score++;
    document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
